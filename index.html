<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイクラ ちしきテスト</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            /* マイクラの草ブロックと土をイメージしたドット絵風背景 */
            background-color: #5c8e32;
            background-image: 
                linear-gradient(45deg, #4d7728 25%, transparent 25%, transparent 75%, #4d7728 75%, #4d7728),
                linear-gradient(45deg, #4d7728 25%, transparent 25%, transparent 75%, #4d7728 75%, #4d7728);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            height: 100vh;
            width: 100vw;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* ヘッダー情報 */
        #header {
            position: absolute;
            top: 15px;
            width: 100%;
            text-align: center;
            z-index: 10;
        }

        .info-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .info-box {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            background: rgba(30, 30, 30, 0.85); /* マイクラの黒背景UI風 */
            padding: 6px 16px;
            border-radius: 4px;
            border: 2px solid #555;
            box-shadow: 0 4px 0px rgba(0,0,0,0.4);
        }

        #timer-box {
            border: 2px solid #ff5555;
            color: #ff5555;
        }

        #question-box {
            background: rgba(230, 230, 230, 0.95);
            border: 5px solid #4a4a4a;
            border-radius: 6px;
            padding: 12px 24px;
            font-size: 20px; /* 1年生向けにひらがなを多くしたため少し小さく調整 */
            font-weight: bold;
            color: #111;
            display: inline-block;
            box-shadow: 0 6px 0px rgba(0,0,0,0.3);
            max-width: 90%;
            line-height: 1.5;
        }

        /* 風船のスタイル */
        .balloon {
            position: absolute;
            width: 115px;
            height: 130px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px; /* カタカナ・ひらがなが収まりやすいサイズ */
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.8);
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.2), 0 10px 15px rgba(0,0,0,0.1);
            animation: sway 3s ease-in-out infinite alternate;
            transition: opacity 0.2s;
            padding: 8px;
            text-align: center;
            word-break: break-all;
        }

        .balloon::after {
            content: "";
            position: absolute;
            bottom: -12px;
            left: 56px;
            width: 2px;
            height: 15px;
            background-color: #888;
        }

        .balloon::before {
            content: "";
            position: absolute;
            bottom: -4px;
            left: 53px;
            width: 8px;
            height: 6px;
            background-color: inherit;
            border-radius: 3px;
        }

        @keyframes sway {
            0% { margin-left: -8px; }
            100% { margin-left: 8px; }
        }

        /* エフェクト */
        .pop-effect {
            position: absolute;
            font-size: 50px;
            animation: fadeOut 0.5s ease-out forwards;
            pointer-events: none;
            z-index: 5;
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: scale(0.5); }
            100% { opacity: 0; transform: scale(1.5); }
        }

        /* ○×メッセージ */
        #message {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 65px;
            font-weight: bold;
            z-index: 100;
            pointer-events: none;
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #message.show {
            transform: translate(-50%, -50%) scale(1);
        }

        .correct-text { color: #55ff55; text-shadow: 3px 3px 0 #000, -3px -3px 0 #000, 3px -3px 0 #000, -3px 3px 0 #000; }
        .wrong-text { color: #ff5555; text-shadow: 3px 3px 0 #000, -3px -3px 0 #000, 3px -3px 0 #000, -3px 3px 0 #000; }

        /* 各種画面のオーバーレイ（重ね合わせ） */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        .window-box {
            background: #2c2c2c;
            color: #fff;
            padding: 25px;
            border-radius: 4px;
            text-align: center;
            box-shadow: 0 10px 0px rgba(0,0,0,0.5);
            max-width: 90%;
            width: 380px;
            border: 4px solid #555555;
        }

        .window-box h2 {
            margin-top: 0;
            color: #ffff55;
            font-size: 24px;
            text-shadow: 2px 2px 0px #000;
        }

        .score-result {
            font-size: 42px;
            font-weight: bold;
            color: #ffaa00;
            margin: 15px 0;
            text-shadow: 3px 3px 0px #000;
        }

        /* マイクラキャラ表示エリア */
        .character-box {
            display: inline-block;
            background-color: #1a1a1a;
            border: 2px solid #555;
            padding: 10px;
            margin: 10px 0;
            font-family: monospace;
            font-size: 11px;
            line-height: 1.1;
            white-space: pre;
            text-align: left;
            color: #55ff55;
        }

        .btn-container {
            display: flex;
            justify-content: space-around;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-vertical-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 25px;
        }

        .btn {
            padding: 12px 25px;
            font-size: 20px;
            font-weight: bold;
            border: 3px solid #000;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: inset -4px -4px 0px rgba(0,0,0,0.4), inset 4px 4px 0px rgba(255,255,255,0.2);
            transition: transform 0.1s;
            flex: 1;
            text-shadow: 1px 1px 0px #000;
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: inset -2px -2px 0px rgba(0,0,0,0.4);
        }

        .btn-name { background-color: #5555ff; color: white; width: 100%; }
        .btn-retry { background-color: #ffaa00; color: white; }
        .btn-quit { background-color: #aaaaaa; color: white; }
        .btn-start { background-color: #55ff55; color: black; text-shadow: none; width: 100%; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-container">
    <!-- ヘッダーエリア -->
    <div id="header">
        <div class="info-bar">
            <div class="info-box">もんだい: <span id="current-q-num">1</span> / 10</div>
            <div class="info-box" id="timer-box">のこり: <span id="timer">15</span>びょう</div>
            <div class="info-box">てんすう: <span id="score">0</span> てん</div>
        </div>
        <div id="question-box"></div>
    </div>

    <!-- まるばつエフェクト -->
    <div id="message"></div>

    <!-- 1. 名前クイズ画面 -->
    <div id="name-screen" class="overlay">
        <div class="window-box" style="border-color: #aa00aa;">
            <h2 id="name-question-title">🤔 きみの なまえは？</h2>
            <div id="name-btn-area" class="btn-vertical-container">
                <button class="btn btn-name" onclick="checkName('ゆうた')">ゆうた</button>
                <button class="btn btn-name" onclick="checkName('ゆうと')">ゆうと</button>
                <button class="btn btn-name" onclick="checkName('ゆうま')">ゆうま</button>
            </div>
            <p id="name-error-text" class="hidden" style="font-size: 28px; font-weight: bold; color: #ff5555; margin: 30px 0; text-shadow: 2px 2px 0px #000;"></p>
        </div>
    </div>

    <!-- 2. スタート説明画面 -->
    <div id="start-screen" class="overlay hidden">
        <div class="window-box" style="border-color: #55ff55;">
            <h2>⚔️ マイクラ ちしきテスト ⚔️</h2>
            <p style="font-size: 15px; color: #ddd; line-height: 1.6; text-align: left; padding: 0 10px;">
                うかんでくる ふうせん から<br>
                ただしい「こたえ」を タッチして ね！<br><br>
                ⏱️ じかん：1もん 15びょう<br>
                📊 ぜんぶで：10もん だよ。
            </p>
            <button class="btn btn-start" onclick="startGame()">スタート！</button>
        </div>
    </div>

    <!-- 3. 結果画面 -->
    <div id="result-screen" class="overlay hidden">
        <div class="window-box">
            <h2>🎉 ぜんぶ おわったよ！</h2>
            <p style="font-size: 16px; margin-bottom: 5px; color:#aaa;">きみの てんすうは...</p>
            <div class="score-result"><span id="final-score">0</span> てん</div>
            
            <!-- キャラクター表示枠 -->
            <div id="character-art" class="character-box"></div>
            
            <p id="evaluation-text" style="font-size: 16px; font-weight: bold; color: #ffff55; margin-top: 10px;"></p>
            <div class="btn-container">
                <button class="btn btn-retry" onclick="restartGame()">もう一回</button>
                <button class="btn btn-quit" onclick="quitGame()">やめる</button>
            </div>
        </div>
    </div>
</div>

<script>
    // 小学1年生向けに、漢字を「小1習得漢字（一、人、水、火、山など）」のみに抑え、あとはひらがな・カタカナに修正した30問
    const allQuizData = [
        { q: "ねざーに 行くための げーとを つくる ぶろっくは？", a: "こくようせき", alternatives: ["がんばん", "てつ"] },
        { q: "くりーぱーが 一ばん にがてで、にげだす どうぶつは？", a: "ねこ", alternatives: ["おおかみ", "きつね"] },
        { q: "えんだーどらごんが いる せかいの なまえは？", a: "えんど", alternatives: ["ねざー", "地上"] },
        { q: "はさみを使って ひつじから とれる ぶろっくは？", a: "羊もう", alternatives: ["いと", "かわ"] },
        { q: "水に ふれると だめーじを うける、ねざーの てきは？", a: "ぶれいず", alternatives: ["がすと", "ぴぐりん"] },
        { q: "だいやの つるはしを つくるのに 必要な だいやの 数は？", a: "3こ", alternatives: ["2こ", "4こ"] },
        { q: "ごーれむを 自分で つくるとき、あたまに のせるものは？", a: "かぼちゃ", alternatives: ["すいか", "金ぶろっく"] },
        { q: "めせんを あわせると、わーぷして おそってくる 黒い てきは？", a: "えんだーまん", alternatives: ["うぃざー", "ぞんび"] },
        { q: "マイクラの せかいで、一ばん かたくて こわせない ぶろっくは？", a: "がんばん", alternatives: ["こくようせき", "だいや"] },
        { q: "かみなりに うたれると、大ばくはつ するようになる てきは？", a: "くりーぱー", alternatives: ["ぞんび", "すけるとん"] },
        { q: "ぞんびが 日の 光を あびたとき、どうなる？", a: "もえる", alternatives: ["きえる", "ちいさくなる"] },
        { q: "高い ところから おちたとき、だめーじを なくす ぶろっくは？", a: "すらいむ", alternatives: ["がらす", "つち"] },
        { q: "すなを かまどで やくと、なにが できる？", a: "がらす", alternatives: ["れんが", "てつ"] },
        { q: "おおかみを ぺっとに するために、あげる アイテムは？", a: "ほね", alternatives: ["おにく", "おさかな"] },
        { q: "やまねこを なつかせるために、あげる アイテムは？", a: "生の さかな", alternatives: ["りんご", "こむぎ"] },
        { q: "むらびとを ぞんびから まもってくれる、つよい みかたは？", a: "あいあん ごーれむ", alternatives: ["すのー ごーれむ", "おおかみ"] },
        { q: "マイクラの よるの じかんは、リアルの じかんで 何分？", a: "7分", alternatives: ["10分", "5分"] },
        { q: "ねざーで べっどを 使って ねようとすると、どうなる？", a: "大ばくはつ する", alternatives: ["あさに なる", "なにも おきない"] },
        { q: "えんだーまんが にがてで、ふれると にげるものは？", a: "水", alternatives: ["まぐま", "ゆき"] },
        { q: "ぱんを つくるために 必要な ものは？", a: "こむぎ", alternatives: ["にんじん", "じゃがいも"] },
        { q: "おなかが 一ばん いっぱいに なる、やいた おにくは？", a: "やいた ぶた肉", alternatives: ["生の ぎゅう肉", "くさった肉"] },
        { q: "のむと とうめいに なったり、あしが 速くなったり するものは？", a: "ぽーしょん", alternatives: ["すーぷ", "みるく"] },
        { q: "はちのすから あつめられる、あまくて おいしいものは？", a: "はちみつ", alternatives: ["さとう", "じゃむ"] },
        { q: "だいやよりも さらに つよい、さいつよの こうせきは？", a: "ねざらいと", alternatives: ["えめらるど", "れっどすとーん"] },
        { q: "うみの そこに ある、おたからが ねむる 大神殿の なまえは？", a: "かいてい しんでん", alternatives: ["さばくの じいん", "もりの ようかん"] },
        { q: "自分が やられたときに、ふっかつする ばしょを きめるものは？", a: "べっど", alternatives: ["ちぇすと", "さぎょうだい"] },
        { q: "どくを かけてくる、あおくて ちいさい くもの なまえは？", a: "どうくつ ぐも", alternatives: ["大ぐも", "ねざー くも"] },
        { q: "さばくの ぴらみっどの なかに ある、あぶない わなは？", a: "てぃーえぬてぃー", alternatives: ["まぐま", "やの わな"] },
        { q: "アイテムを たくさん しまっておける、きで つくる 箱は？", a: "ちぇすと", alternatives: ["さぎょうだい", "かまど"] },
        { q: "くらい どうくつを 明るく てらすために、よく使うものは？", a: "たいまつ", alternatives: ["らんたん", "ぐろうすとーん"] }
    ];

    // ドット絵風AA(アスキーアート)データ
    const steveArt = 
`■■■■■■■■
■🏽🏽🏽🏽🏽🏽■
■🏽⬛🏽🏽⬛🏽■
■🏽🏽🏽🏽🏽🏽■
■🏽🏽⬛⬛🏽🏽■
■🏽🏽🏽🏽🏽🏽■  [スティーブ]`;

    const creeperArt = 
`🟩🟩🟩🟩🟩🟩🟩🟩
🟩⬛⬛🟩🟩⬛⬛🟩
🟩⬛⬛🟩🟩⬛⬛🟩
🟩🟩🟩⬛⬛🟩🟩🟩
🟩🟩⬛⬛⬛⬛🟩🟩
🟩🟩⬛🟩🟩⬛🟩🟩  [クリーパー]`;

    const zombieArt = 
`🟢🟢🟢🟢🟢🟢🟢🟢
🟢⬛⬛🟢🟢⬛⬛🟢
🟢🟢🟢🟢🟢🟢🟢🟢
🟢🟢🟢⬛⬛🟢🟢🟢
🟢🟢🟢🟢🟢🟢🟢🟢  [ゾンビ]`;

    const pigArt = 
`🌸🌸🌸🌸🌸🌸🌸🌸
🌸⬛🌸🌸🌸⬛🌸🌸
🌸🌸🌸🌸🌸🌸🌸🌸
🌸🌸🐽🐽🐽🌸🌸🌸
🌸🌸🌸🌸🌸🌸🌸🌸  [ブタ]`;

    const colors = ['#FF6B6B', '#4DABF7', '#51CF66', '#FCC419', '#FF922B', '#CC5DE8'];
    const TOTAL_QUESTIONS = 10;
    const TIME_LIMIT = 15;     // 15秒にへんこう

    let gameQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let activeBalloons = [];
    
    let timerCount = TIME_LIMIT;
    let timerInterval = null;
    let animationFrameId = null;
    let isQuestionActive = false;

    const gameContainer = document.getElementById('game-container');
    const questionBox = document.getElementById('question-box');
    const scoreDisplay = document.getElementById('score');
    const currentQNumDisplay = document.getElementById('current-q-num');
    const timerDisplay = document.getElementById('timer');
    const messageDisplay = document.getElementById('message');
    
    const nameScreen = document.getElementById('name-screen');
    const nameQuestionTitle = document.getElementById('name-question-title');
    const nameBtnArea = document.getElementById('name-btn-area');
    const nameErrorText = document.getElementById('name-error-text');

    const startScreen = document.getElementById('start-screen');
    const resultScreen = document.getElementById('result-screen');
    const finalScoreDisplay = document.getElementById('final-score');
    const characterArt = document.getElementById('character-art');
    const evaluationText = document.getElementById('evaluation-text');

    function checkName(selectedName) {
        if (selectedName === 'ゆうと') {
            nameScreen.classList.add('hidden');
            startScreen.classList.remove('hidden');
        } else {
            nameQuestionTitle.classList.add('hidden');
            nameBtnArea.classList.add('hidden');
            
            nameErrorText.textContent = "え、ほんとうに？";
            nameErrorText.classList.remove('hidden');

            setTimeout(() => {
                nameErrorText.classList.add('hidden');
                nameQuestionTitle.classList.remove('hidden');
                nameBtnArea.classList.remove('hidden');
            }, 3000);
        }
    }

    function startGame() {
        startScreen.classList.add('hidden');
        resultScreen.classList.add('hidden');
        score = 0;
        currentQuestionIndex = 0;
        scoreDisplay.textContent = score;
        
        let shuffled = [...allQuizData].sort(() => Math.random() - 0.5);
        gameQuestions = shuffled.slice(0, TOTAL_QUESTIONS);

        isQuestionActive = true;
        loadQuestion();
        
        if(!animationFrameId) {
            updateGame();
        }
    }

    function loadQuestion() {
        clearBalloons();

        if (currentQuestionIndex >= TOTAL_QUESTIONS) {
            endGame();
            return;
        }

        isQuestionActive = true;
        currentQNumDisplay.textContent = currentQuestionIndex + 1;
        const currentQuestion = gameQuestions[currentQuestionIndex];
        questionBox.textContent = currentQuestion.q;

        timerCount = TIME_LIMIT;
        timerDisplay.textContent = timerCount;
        clearInterval(timerInterval);
        timerInterval = setInterval(countdown, 1000);

        let choices = [currentQuestion.a, ...currentQuestion.alternatives];
        choices.sort(() => Math.random() - 0.5);

        const width = window.innerWidth;
        choices.forEach((text, index) => {
            const balloon = document.createElement('div');
            balloon.className = 'balloon';
            balloon.textContent = text;
            
            balloon.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            balloon.style.left = `${(width / 3) * index + (Math.random() * 20 - 10) + 15}px`;
            balloon.style.bottom = `-160px`;

            balloon.speed = 0.9 + Math.random() * 0.6; // 1年生が文字を読みやすいように少しだけゆっくりに調整

            balloon.addEventListener('touchstart', (e) => { e.preventDefault(); handleSelection(text, balloon); });
            balloon.addEventListener('mousedown', () => handleSelection(text, balloon));

            gameContainer.appendChild(balloon);
            activeBalloons.push(balloon);
        });
    }

    function countdown() {
        timerCount--;
        timerDisplay.textContent = timerCount;

        if (timerCount <= 0) {
            clearInterval(timerInterval);
            isQuestionActive = false;
            showMessage("⏰ じかんぎれ！", "wrong-text");
            
            setTimeout(() => {
                currentQuestionIndex++;
                loadQuestion();
            }, 1500);
        }
    }

    function handleSelection(selectedText, balloonElement) {
        if (!isQuestionActive) return;

        const currentQuestion = gameQuestions[currentQuestionIndex];

        if (selectedText === currentQuestion.a) {
            clearInterval(timerInterval);
            isQuestionActive = false;
            score += 10;
            scoreDisplay.textContent = score;
            showMessage("○ せいかい！", "correct-text");
            createPopEffect(balloonElement, "🎈💥✨");
            
            setTimeout(() => {
                currentQuestionIndex++;
                loadQuestion();
            }, 1200);
        } else {
            clearInterval(timerInterval);
            isQuestionActive = false;
            showMessage("× ちがうよ！", "wrong-text");
            createPopEffect(balloonElement, "☁️");
            
            setTimeout(() => {
                currentQuestionIndex++;
                loadQuestion();
            }, 1500);
        }
    }

    function updateGame() {
        activeBalloons.forEach(balloon => {
            let currentBottom = parseFloat(balloon.style.bottom);
            currentBottom += balloon.speed;
            balloon.style.bottom = `${currentBottom}px`;

            if (currentBottom > window.innerHeight && isQuestionActive) {
                balloon.style.bottom = `-160px`;
                balloon.style.left = `${Math.random() * (window.innerWidth - 120)}px`;
            }
        });
        animationFrameId = requestAnimationFrame(updateGame);
    }

    function clearBalloons() {
        activeBalloons.forEach(b => b.remove());
        activeBalloons = [];
    }

    function createPopEffect(element, emoji) {
        const rect = element.getBoundingClientRect();
        const effect = document.createElement('div');
        effect.className = 'pop-effect';
        effect.textContent = emoji;
        effect.style.left = `${rect.left + 20}px`;
        effect.style.top = `${rect.top + 20}px`;
        gameContainer.appendChild(effect);
        setTimeout(() => effect.remove(), 500);
    }

    function showMessage(text, className) {
        messageDisplay.textContent = text;
        messageDisplay.className = className + " show";
        setTimeout(() => {
            messageDisplay.className = "";
        }, 1100);
    }

    function endGame() {
        clearInterval(timerInterval);
        isQuestionActive = false;
        clearBalloons();

        finalScoreDisplay.textContent = score;
        
        if (score === 100) {
            characterArt.style.color = "#55ff55"; 
            characterArt.textContent = steveArt;
            evaluationText.textContent = "🏅 100てん！サバイバル たつじん(すてぃーぶ) だ！";
        } else if (score >= 70) {
            characterArt.style.color = "#55ff55"; 
            characterArt.textContent = creeperArt;
            evaluationText.textContent = "🌟 すごい！くりーぱー も びっくり の ちしき！";
        } else if (score >= 40) {
            characterArt.style.color = "#00aaaa"; 
            characterArt.textContent = zombieArt;
            evaluationText.textContent = "👍 がんばったね！ぞんび より マイクラ に くわしいぞ！";
        } else {
            characterArt.style.color = "#ff55ff"; 
            characterArt.textContent = pigArt;
            evaluationText.textContent = "ぶたさん と いっしょに つぎ も がんばろう！";
        }

        resultScreen.classList.remove('hidden');
    }

    // もう一回遊ぶ
    function restartGame() {
        resultScreen.classList.add('hidden');
        nameScreen.classList.remove('hidden');
        nameQuestionTitle.classList.remove('hidden');
        nameBtnArea.classList.remove('hidden');
        nameErrorText.classList.add('hidden');
    }

    // やめる
    function quitGame() {
        clearInterval(timerInterval);
        clearBalloons();
        if(animationFrameId) {
            cancelAnimationFrame(animationFrameId);
            animationFrameId = null;
        }
        
        window.close();

        gameContainer.innerHTML = `
            <div style="display:flex; justify-content:center; align-items:center; width:100vw; height:100vh; background:#111; color:#fff; flex-direction:column; padding: 20px; text-align:center;">
                <h1 style="font-size:32px; color:#55ff55; margin-bottom:10px;">あそんでくれて ありがとう！</h1>
                <p style="font-size:18px; color:#aaa; margin-bottom:20px;">また マイクラ の せかい で あおうね！</p>
                <p style="font-size:14px; color:#555;">※画面が閉じない場合は、タブを閉じてね。</p>
            </div>
        `;
    }

    window.addEventListener('resize', () => {
        if(isQuestionActive && gameQuestions.length > 0) {
            const width = window.innerWidth;
            activeBalloons.forEach((balloon, index) => {
                balloon.style.left = `${(width / 3) * index + 15}px`;
            });
        }
    });
</script>
</body>
</html>
