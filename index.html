<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイクラ ちしきテスト</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            /* マイクラの草ブロックと土をイメージしたドット絵風背景 */
            background-color: #5c8e32;
            background-image: 
                linear-gradient(45deg, #4d7728 25%, transparent 25%, transparent 75%, #4d7728 75%, #4d7728),
                linear-gradient(45deg, #4d7728 25%, transparent 25%, transparent 75%, #4d7728 75%, #4d7728);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            height: 100vh;
            width: 100vw;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* ヘッダー情報 */
        #header {
            position: absolute;
            top: 15px;
            width: 100%;
            text-align: center;
            z-index: 10;
        }

        .info-bar {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .info-box {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            background: rgba(30, 30, 30, 0.85); /* マイクラの黒背景UI風 */
            padding: 6px 16px;
            border-radius: 4px;
            border: 2px solid #555;
            box-shadow: 0 4px 0px rgba(0,0,0,0.4);
        }

        #timer-box {
            border: 2px solid #ff5555;
            color: #ff5555;
        }

        #question-box {
            background: rgba(230, 230, 230, 0.95);
            border: 5px solid #4a4a4a;
            border-radius: 6px;
            padding: 12px 24px;
            font-size: 20px;
            font-weight: bold;
            color: #111;
            display: inline-block;
            box-shadow: 0 6px 0px rgba(0,0,0,0.3);
            max-width: 90%;
            line-height: 1.5;
        }

        /* マイクラ風ブロック選択肢のスタイル */
        .block-choice {
            position: absolute;
            width: 110px;
            height: 110px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.8);
            /* マイクラのブロックっぽいドット絵風の枠線と立体感 */
            border: 6px solid #333;
            box-shadow: inset -8px -8px 0px rgba(0,0,0,0.3), inset 8px 8px 0px rgba(255,255,255,0.2), 0 8px 10px rgba(0,0,0,0.3);
            padding: 8px;
            text-align: center;
            word-break: break-all;
        }

        /* エフェクト */
        .pop-effect {
            position: absolute;
            font-size: 50px;
            animation: fadeOut 0.5s ease-out forwards;
            pointer-events: none;
            z-index: 5;
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: scale(0.5); }
            100% { opacity: 0; transform: scale(1.5); }
        }

        /* ○×メッセージ */
        #message {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 65px;
            font-weight: bold;
            z-index: 100;
            pointer-events: none;
            transition: transform 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #message.show {
            transform: translate(-50%, -50%) scale(1);
        }

        .correct-text { color: #55ff55; text-shadow: 3px 3px 0 #000, -3px -3px 0 #000, 3px -3px 0 #000, -3px 3px 0 #000; }
        .wrong-text { color: #ff5555; text-shadow: 3px 3px 0 #000, -3px -3px 0 #000, 3px -3px 0 #000, -3px 3px 0 #000; }

        /* 各種画面のオーバーレイ（重ね合わせ） */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }

        .window-box {
            background: #2c2c2c;
            color: #fff;
            padding: 25px;
            border-radius: 4px;
            text-align: center;
            box-shadow: 0 10px 0px rgba(0,0,0,0.5);
            max-width: 90%;
            width: 380px;
            border: 4px solid #555555;
        }

        .window-box h2 {
            margin-top: 0;
            color: #ffff55;
            font-size: 24px;
            text-shadow: 2px 2px 0px #000;
        }

        .score-result {
            font-size: 42px;
            font-weight: bold;
            color: #ffaa00;
            margin: 15px 0;
            text-shadow: 3px 3px 0px #000;
        }

        /* マイクラキャラ表示エリア */
        .character-box {
            display: inline-block;
            background-color: #1a1a1a;
            border: 2px solid #555;
            padding: 10px;
            margin: 10px 0;
            font-family: monospace;
            font-size: 11px;
            line-height: 1.1;
            white-space: pre;
            text-align: left;
        }

        .btn-container {
            display: flex;
            justify-content: space-around;
            gap: 15px;
            margin-top: 20px;
        }

        .btn-vertical-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 25px;
        }

        .btn {
            padding: 12px 25px;
            font-size: 20px;
            font-weight: bold;
            border: 3px solid #000;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: inset -4px -4px 0px rgba(0,0,0,0.4), inset 4px 4px 0px rgba(255,255,255,0.2);
            transition: transform 0.1s;
            flex: 1;
            text-shadow: 1px 1px 0px #000;
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: inset -2px -2px 0px rgba(0,0,0,0.4);
        }

        .btn-name { background-color: #5555ff; color: white; width: 100%; }
        .btn-retry { background-color: #ffaa00; color: white; }
        .btn-quit { background-color: #aaaaaa; color: white; }
        .btn-start { background-color: #55ff55; color: black; text-shadow: none; width: 100%; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="header">
        <div class="info-bar">
            <div class="info-box">もんだい: <span id="current-q-num">1</span> / 10</div>
            <div class="info-box" id="timer-box">のこり: <span id="timer">15</span>びょう</div>
            <div class="info-box">てんすう: <span id="score">0</span> てん</div>
        </div>
        <div id="question-box"></div>
    </div>

    <div id="message"></div>

    <div id="name-screen" class="overlay">
        <div class="window-box" style="border-color: #aa00aa;">
            <h2 id="name-question-title">🤔 きみの なまえは？</h2>
            <div id="name-btn-area" class="btn-vertical-container">
                <button class="btn btn-name" onclick="checkName('ゆうta')">ゆうた</button>
                <button class="btn btn-name" onclick="checkName('ゆうと')">ゆうと</button>
                <button class="btn btn-name" onclick="checkName('ゆうま')">ゆうま</button>
            </div>
            <p id="name-error-text" class="hidden" style="font-size: 28px; font-weight: bold; color: #ff5555; margin: 30px 0; text-shadow: 2px 2px 0px #000;"></p>
        </div>
    </div>

    <div id="start-screen" class="overlay hidden">
        <div class="window-box" style="border-color: #55ff55;">
            <h2>⚔️ マイクラ ちしきテスト ⚔️</h2>
            <p style="font-size: 15px; color: #ddd; line-height: 1.6; text-align: left; padding: 0 10px;">
                したから うかんでくる 「ぶろっく」 から<br>
                ただしい「こたえ」を タッチして ね！<br><br>
                ⏱️ じかん：1もん 15びょう<br>
                📊 ぜんぶで：10もん だよ。
            </p>
            <button class="btn btn-start" onclick="startGame()">スタート！</button>
        </div>
    </div>

    <div id="result-screen" class="overlay hidden">
        <div class="window-box">
            <h2>🎉 ぜんぶ おわったよ！</h2>
            <p style="font-size: 16px; margin-bottom: 5px; color:#aaa;">きみの てんすうは...</p>
            <div class="score-result"><span id="final-score">0</span> てん</div>
            
            <div id="character-art" class="character-box"></div>
            
            <p id="evaluation-text" style="font-size: 15px; font-weight: bold; color: #ffff55; margin-top: 10px; line-height: 1.4;"></p>
            <div class="btn-container">
                <button class="btn btn-retry" onclick="restartGame()">もういっかい</button>
                <button class="btn btn-quit" onclick="quitGame()">やめる</button>
            </div>
        </div>
    </div>
</div>

    // BGM再生システム
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function playTone(freq, type, duration, vol) {
        if (!audioCtx) return;
        try {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        } catch(e) {}
    }

    function startBGM() {
        initAudio();
        if (bgmInterval) clearInterval(bgmInterval);
        bgmStep = 0;
        
        // 0.28秒ごとに音を鳴らすテンポ
        bgmInterval = setInterval(() => {
            if (!isQuestionActive) return;
            let note = bgmMelody[bgmStep % bgmMelody.length];
            let freq = 440 * Math.pow(2, (note - 69) / 12);
            
            // ピコピコした三角波で優しいバックグラウンド音
            playTone(freq, 'triangle', 0.4, 0.08);
            
            // リズム用のサブ音（ベース）
            if (bgmStep % 4 === 0) {
                let baseNote = bgmMelody[Math.floor(bgmStep / 4) % bgmMelody.length] - 12;
                let baseFreq = 440 * Math.pow(2, (baseNote - 69) / 12);
                playTone(baseFreq, 'sine', 0.6, 0.1);
            }
            bgmStep++;
        }, 280);
    }

    function stopBGM() {
        if (bgmInterval) {
            clearInterval(bgmInterval);
            bgmInterval = null;
        }
    }

    // 効果音とクリア用ファンファーレ
    function playSoundEffect(type) {
        initAudio();
        if (!audioCtx) return;
        if (type === 'correct') {
            playTone(523.25, 'square', 0.1, 0.15); // ド
            setTimeout(() => playTone(659.25, 'square', 0.15, 0.15), 100); // ミ
            setTimeout(() => playTone(783.99, 'square', 0.2, 0.15), 200); // ソ
        } else if (type === 'wrong') {
            playTone(293.66, 'sawtooth', 0.15, 0.15); // レ
            setTimeout(() => playTone(220.00, 'sawtooth', 0.3, 0.15), 150); // ラ
        } else if (type === 'pop') {
            playTone(880, 'sine', 0.05, 0.2);
        } else if (type === 'fanfare_perfect') {
            // 100点用：大ファンファーレ！
            const notes = [523.25, 523.25, 523.25, 523.25, 659.25, 587.33, 659.25, 783.99, 1046.50];
            const delays = [0, 150, 300, 450, 600, 750, 900, 1050, 1200];
            const durs = [0.1, 0.1, 0.1, 0.3, 0.15, 0.15, 0.15, 0.15, 0.8];
            notes.forEach((n, i) => {
                setTimeout(() => playTone(n, 'square', durs[i], 0.15), delays[i]);
            });
        } else if (type === 'fanfare_good') {
            // 高得点用：明るいファンファーレ
            const notes = [523.25, 659.25, 783.99, 1046.50, 783.99, 1046.50];
            const delays = [0, 150, 300, 450, 650, 800];
            notes.forEach((n, i) => {
                setTimeout(() => playTone(n, 'square', 0.2, 0.15), delays[i]);
            });
        } else if (type === 'melody_bad') {
            // 低得点用：どんまいメロディ
            const notes = [392.00, 349.23, 311.13, 293.66];
            const delays = [0, 250, 500, 750];
            notes.forEach((n, i) => {
                setTimeout(() => playTone(n, 'triangle', 0.4, 0.15), delays[i]);
            });
        }
    }

        gameQuestions = shuffled.slice(0, TOTAL_QUESTIONS);

        isQuestionActive = true;
        loadQuestion();
        startBGM();
        
        if(!animationFrameId) {
            updateGame();
        }
    }

    function loadQuestion() {
        clearBalloons();

        if (currentQuestionIndex >= TOTAL_QUESTIONS) {
            endGame();
            return;
        }

        isQuestionActive = true;
        currentQNumDisplay.textContent = currentQuestionIndex + 1;
        const currentQuestion = gameQuestions[currentQuestionIndex];
        questionBox.textContent = currentQuestion.q;

        timerCount = TIME_LIMIT;
        timerDisplay.textContent = timerCount;
        clearInterval(timerInterval);
        timerInterval = setInterval(countdown, 1000);

        let choices = [currentQuestion.a, ...currentQuestion.alternatives];
        choices.sort(() => Math.random() - 0.5);

        const width = window.innerWidth;
        choices.forEach((text, index) => {
            const blockObj = document.createElement('div');
            blockObj.className = 'block-choice';
            blockObj.textContent = text;
            
            let style = blockStyles[Math.floor(Math.random() * blockStyles.length)];
            blockObj.style.backgroundColor = style.bg;
            blockObj.style.borderColor = style.border;
            
            blockObj.style.left = `${(width / 3) * index + (Math.random() * 16 - 8) + 12}px`;
            blockObj.style.bottom = `-140px`;
            blockObj.speed = 0.8 + Math.random() * 0.5;

            blockObj.addEventListener('touchstart', (e) => { e.preventDefault(); handleSelection(text, blockObj); });
            blockObj.addEventListener('mousedown', () => handleSelection(text, blockObj));

            gameContainer.appendChild(blockObj);
            activeBalloons.push(blockObj);
        });
    }

    function countdown() {
        if (!isQuestionActive) return;
        timerCount--;
        timerDisplay.textContent = timerCount;

        if (timerCount <= 0) {
            clearInterval(timerInterval);
            isQuestionActive = false;
            showMessage("⏰ じかんぎれ！", "wrong-text");
            playSoundEffect('wrong');
            
            setTimeout(() => {
                currentQuestionIndex++;
                loadQuestion();
            }, 1500);
        }
    }

    function handleSelection(selectedText, element) {
        if (!isQuestionActive) return;

        const currentQuestion = gameQuestions[currentQuestionIndex];

        if (selectedText === currentQuestion.a) {
            clearInterval(timerInterval);
            isQuestionActive = false;
            score += 10;
            scoreDisplay.textContent = score;
            showMessage("○ せいかい！", "correct-text");
            playSoundEffect('correct');
            createPopEffect(element, "💎💥✨");
            
            setTimeout(() => {
                currentQuestionIndex++;
                loadQuestion();
            }, 1200);
        } else {
            clearInterval(timerInterval);
            isQuestionActive = false;
            showMessage("× ちがうよ！", "wrong-text");
            playSoundEffect('wrong');
            createPopEffect(element, "💨");
            
            setTimeout(() => {
                currentQuestionIndex++;
                loadQuestion();
            }, 1500);
        }
    }

    function updateGame() {
        activeBalloons.forEach(blockObj => {
            let currentBottom = parseFloat(blockObj.style.bottom);
            currentBottom += blockObj.speed;
            blockObj.style.bottom = `${currentBottom}px`;

            if (currentBottom > window.innerHeight && isQuestionActive) {
                blockObj.style.bottom = `-140px`;
                blockObj.style.left = `${Math.random() * (window.innerWidth - 110)}px`;
            }
        });
        animationFrameId = requestAnimationFrame(updateGame);
    }

    function clearBalloons() {
        activeBalloons.forEach(b => b.remove());

    function createPopEffect(element, emoji) {
        const rect = element.getBoundingClientRect();

        effect.style.top = `${rect.top + 15}px`;
        gameContainer.appendChild(effect);
        setTimeout(() => effect.remove(), 500);

        window.close();

        gameContainer.innerHTML = `
            <div style="display:flex; justify-content:center; align-items:center; width:100vw; height:100vh; background:#111; color:#fff; flex-direction:column; padding: 20px; text-align:center;">
                <h1 style="font-size:32px; color:#55ff55; margin-bottom:10px;">あそんでくれて ありがとう！</h1>
                <p style="font-size:18px; color:#aaa; margin-bottom:20px;">また マイクラ の せかい で あおうね！</p>
                <p style="font-size:14px; color:#555;">※がめんが とじない ばあいは、たぶを とじてね。</p>
            </div>
        `;
    }

    window.addEventListener('resize', () => {
        if(isQuestionActive && gameQuestions.length > 0) {
            const width = window.innerWidth;
            activeBalloons.forEach((blockObj, index) => {
                blockObj.style.left = `${(width / 3) * index + 12}px`;
            });
        }
    });
</script>
